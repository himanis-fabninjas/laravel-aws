services:
  nginx:
    image: nginx:alpine
    container_name: fresh_laravel_nginx
    ports:
      - "8082:80"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fresh_laravel_app
    volumes:
      - ./:/var/www
      - ./local.ini:/usr/local/etc/php/conf.d/local.ini
    depends_on:
      mysql:
        condition: service_started
    networks:
      - laravel-net

  mysql:
    image: mysql:8.0
    container_name: mysql_container
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: laravel
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - laravel-net

volumes:
  db_data:

networks:
  laravel-net:
    driver: bridge
