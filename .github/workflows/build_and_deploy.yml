name: 'deploy on ec2'
on:
    push:
        branches:
        - main
jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - uses: appleboy/ssh-action@v1
              with:
                host: ${{ vars.EC2_HOST }}
                username: ubuntu
                key: ${{ secrets.EC2_SSH_KEY }}
                script: |
                    cd /home/ubuntu/Intro-to-docker
                    git fetch origin
                    git reset --hard origin/main
                    docker compose up -d --build
